<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TO-DO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="app-header">
    <h1>TO-DO</h1>
    <p class="subtitle">
      <span id="taskCount">0 TAREFAS</span> — <span id="completedCount">0 COMPLETAS</span>
    </p>
  </header>

  <section class="progress-section">
    <div class="progress-label">
      <span>PROGRESSO</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </section>

  <section class="input-section">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="new task..." maxlength="120">
      <button id="addBtn">+ ADICIONAR</button>
    </div>

    <div class="options-row">
      <div class="category-select-wrap">
        <select id="categorySelect">
          <option value="work">TRABALHO</option>
          <option value="personal">PESSOAL</option>
          <option value="study">ESTUDO</option>
          <option value="health">SAÚDE</option>
          <option value="errands">RECADOS</option>
        </select>
      </div>

      <div class="priority-select">
        <span class="priority-label">PRIORIDADE:</span>
        <button class="priority-btn" data-priority="high">DIFICIL</button>
        <button class="priority-btn is-active" data-priority="medium">MEDIO</button>
        <button class="priority-btn" data-priority="low">FACIL</button>
      </div>
    </div>
  </section>

  <section class="filter-section">
    <div class="filter-group status-filters">
      <button class="filter-btn is-active" data-filter="all">TODOS</button>
      <button class="filter-btn" data-filter="active">ATIVOS</button>
      <button class="filter-btn" data-filter="done">CONCLUIDOS</button>
    </div>

    <div class="filter-group category-filters">
      <button class="cat-btn is-active" data-cat="all">TODOS</button>
      <button class="cat-btn" data-cat="work">TRABALHO</button>
      <button class="cat-btn" data-cat="personal">PESSOAL</button>
      <button class="cat-btn" data-cat="study">ESTUDO</button>
      <button class="cat-btn" data-cat="health">SAÚDE</button>
      <button class="cat-btn" data-cat="errands">RECADOS</button>
    </div>
  </section>

  <ul class="task-list" id="taskList"></ul>

  <p class="empty-state" id="emptyState">[ SEM TAREFAS ]</p>

  <footer class="app-footer">
    <span id="remainingCount">0 restantes</span>
    <button id="clearCompleted">LIMPAR AS COMPLETAS</button>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
