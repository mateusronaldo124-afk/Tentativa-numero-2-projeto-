<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TO-DO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="app-header">
    <h1>TO-DO</h1>
    <p class="subtitle">
      <span id="taskCount">0 TASKS</span> — <span id="completedCount">0 COMPLETED</span>
    </p>
  </header>

  <section class="progress-section">
    <div class="progress-label">
      <span>PROGRESS</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </section>

  <section class="input-section">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="new task..." maxlength="120">
      <button id="addBtn">+ ADD</button>
    </div>

    <div class="options-row">
      <div class="category-select-wrap">
        <select id="categorySelect">
          <option value="work">WORK</option>
          <option value="personal">PERSONAL</option>
          <option value="study">STUDY</option>
          <option value="health">HEALTH</option>
          <option value="errands">ERRANDS</option>
        </select>
      </div>

      <div class="priority-select">
        <span class="priority-label">PRIORITY:</span>
        <button class="priority-btn" data-priority="high">HIGH</button>
        <button class="priority-btn is-active" data-priority="medium">MEDIUM</button>
        <button class="priority-btn" data-priority="low">LOW</button>
      </div>
    </div>
  </section>

  <section class="filter-section">
    <div class="filter-group status-filters">
      <button class="filter-btn is-active" data-filter="all">ALL</button>
      <button class="filter-btn" data-filter="active">ACTIVE</button>
      <button class="filter-btn" data-filter="done">DONE</button>
    </div>

    <div class="filter-group category-filters">
      <button class="cat-btn is-active" data-cat="all">ALL</button>
      <button class="cat-btn" data-cat="work">WORK</button>
      <button class="cat-btn" data-cat="personal">PERSONAL</button>
      <button class="cat-btn" data-cat="study">STUDY</button>
      <button class="cat-btn" data-cat="health">HEALTH</button>
      <button class="cat-btn" data-cat="errands">ERRANDS</button>
    </div>
  </section>

  <ul class="task-list" id="taskList"></ul>

  <p class="empty-state" id="emptyState">No tasks here. Add one above.</p>

  <footer class="app-footer">
    <span id="remainingCount">0 remaining</span>
    <button id="clearCompleted">CLEAR COMPLETED</button>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
